<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Search Engine</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <h1 class = "logo">🎬MovieVerse</h1>
        <p class = "tagline">Search your favorite movies and view details Instantly..<br>Discover movies from around the world!</p>
        <div class="search-container">
            <input type="text" id="movie-input" placeholder="Search for a movie...">
            <button id="search-btn">Search</button>
        </div>
        <div id="movie-result"></div>
    </div>
    <script src="script.js"></script>

</body>

</html>
